<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع طلبك - Smile Shop</title>
<meta name="description" content="تتبع حالة طلبك في متجر Smile Shop برقم هاتفك">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="/config.js"></script>
<style>
:root{--bg:#08080f;--bg2:#0f0f1e;--card:rgba(255,255,255,.05);--border:rgba(255,255,255,.08);--purple:#7c3aed;--pink:#d946ef;--grad:linear-gradient(135deg,#7c3aed,#d946ef);--txt:#f1f5f9;--txt2:#94a3b8;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--blue:#3b82f6}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* Header */
header{background:rgba(8,8,15,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 2rem}
.hdr{max-width:800px;margin:0 auto;height:65px;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.4rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.back-btn{color:var(--txt2);font-size:.9rem;text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:.2s}
.back-btn:hover{color:var(--txt)}

/* Hero */
.hero{text-align:center;padding:3.5rem 2rem 2rem;background:radial-gradient(ellipse at 50% 0%,rgba(124,58,237,.12),transparent 65%)}
.hero h1{font-size:2.2rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.6rem}
.hero p{color:var(--txt2);font-size:1rem}

/* Search Box */
.search-section{max-width:520px;margin:0 auto;padding:0 1.5rem 3rem}
.search-card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:2rem}
.search-card label{display:block;font-size:.9rem;color:var(--txt2);margin-bottom:.6rem}
.inp-row{display:flex;gap:.6rem}
.inp{flex:1;padding:.85rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:12px;color:var(--txt);font-family:inherit;font-size:1rem;outline:none;transition:.3s}
.inp:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.15)}
.btn-search{padding:.85rem 1.4rem;background:var(--grad);border:none;border-radius:12px;color:#fff;font-family:inherit;font-size:.95rem;font-weight:700;cursor:pointer;transition:.3s;white-space:nowrap}
.btn-search:hover{opacity:.9}
.btn-search:disabled{opacity:.5;cursor:not-allowed}

/* Results */
.results{max-width:800px;margin:0 auto;padding:0 1.5rem 4rem}
.results-title{font-size:1.1rem;font-weight:700;margin-bottom:1.2rem;color:var(--txt2)}
.order-card{background:var(--bg2);border:1px solid var(--border);border-radius:16px;margin-bottom:1.2rem;overflow:hidden}
.order-header{padding:1rem 1.4rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);cursor:pointer;transition:.2s}
.order-header:hover{background:rgba(255,255,255,.02)}
.order-id{font-size:.8rem;color:var(--txt2)}
.order-date{font-size:.85rem;color:var(--txt2)}
.badge{padding:.3rem .8rem;border-radius:50px;font-size:.75rem;font-weight:700}
.badge.pending{background:rgba(245,158,11,.15);color:var(--yellow)}
.badge.processing{background:rgba(59,130,246,.15);color:var(--blue)}
.badge.shipped{background:rgba(124,58,237,.15);color:var(--purple)}
.badge.delivered{background:rgba(16,185,129,.15);color:var(--green)}
.badge.cancelled{background:rgba(239,68,68,.15);color:var(--red)}
.order-body{padding:1.2rem 1.4rem;display:none}
.order-body.open{display:block}

/* Timeline */
.timeline{display:flex;justify-content:space-between;margin:1rem 0 1.5rem;position:relative}
.timeline::before{content:'';position:absolute;top:16px;left:0;right:0;height:2px;background:var(--border);z-index:0}
.step{flex:1;text-align:center;position:relative;z-index:1}
.step-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--bg);margin:0 auto .5rem;display:flex;align-items:center;justify-content:center;font-size:.9rem}
.step.done .step-dot{background:var(--grad);border-color:transparent;color:#fff}
.step.active .step-dot{border-color:var(--purple);color:var(--purple);box-shadow:0 0 0 4px rgba(124,58,237,.2)}
.step-label{font-size:.7rem;color:var(--txt2)}
.step.done .step-label,.step.active .step-label{color:var(--txt)}

.items-table{width:100%;border-collapse:collapse;font-size:.875rem;margin-bottom:1rem}
.items-table th{text-align:right;padding:.5rem;color:var(--txt2);font-weight:600;border-bottom:1px solid var(--border)}
.items-table td{padding:.6rem .5rem;border-bottom:1px solid rgba(255,255,255,.04)}
.total-row{display:flex;justify-content:space-between;font-weight:700;padding-top:.8rem;border-top:1px solid var(--border)}
.total-row span:last-child{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.empty{text-align:center;padding:3rem;color:var(--txt2)}
.empty i{font-size:3rem;opacity:.3;display:block;margin-bottom:.8rem}

/* Spinner */
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:spin .8s linear infinite;margin:2rem auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <a href="/" class="logo">😊 Smile Shop</a>
    <a href="/" class="back-btn"><i class="fa fa-arrow-right"></i> العودة للمتجر</a>
  </div>
</header>

<div class="hero">
  <h1><i class="fa fa-map-marker-alt" style="font-size:1.8rem"></i> تتبع طلبك</h1>
  <p>أدخل رقم هاتفك لمعرفة حالة طلباتك</p>
</div>

<div class="search-section">
  <div class="search-card">
    <label for="phoneInput">رقم الهاتف المستخدم عند الطلب</label>
    <div class="inp-row" style="margin-bottom:1rem;">
      <input class="inp" type="tel" id="phoneInput" placeholder="07xxxxxxxxx" onkeydown="if(event.key==='Enter') document.getElementById('orderIdInput').focus()">
    </div>
    <label for="orderIdInput">رقم الطلب (ID)</label>
    <div class="inp-row">
      <input class="inp" type="text" id="orderIdInput" placeholder="أدخل رقم الطلب..." onkeydown="if(event.key==='Enter') trackOrders()">
      <button class="btn-search" id="trackBtn" onclick="trackOrders()">
        <i class="fa fa-search"></i> تتبع
      </button>
    </div>
  </div>
</div>

<div class="results" id="resultsSection" style="display:none">
  <div id="resultsContent"></div>
</div>

<script>
const API = (window.APP_CONFIG && window.APP_CONFIG.API_URL) || 'http://localhost:3000/api';

const statusLabels = {
  pending:    { ar: 'معلق',          icon: 'fa-clock' },
  processing: { ar: 'قيد التجهيز',   icon: 'fa-cog' },
  shipped:    { ar: 'في الطريق',      icon: 'fa-truck' },
  delivered:  { ar: 'تم التوصيل',    icon: 'fa-check-circle' },
  cancelled:  { ar: 'ملغي',          icon: 'fa-times-circle' }
};

const timelineSteps = ['pending','processing','shipped','delivered'];

function getStepState(orderStatus, step) {
  if (orderStatus === 'cancelled') return '';
  const orderIdx = timelineSteps.indexOf(orderStatus);
  const stepIdx  = timelineSteps.indexOf(step);
  if (stepIdx < orderIdx)  return 'done';
  if (stepIdx === orderIdx) return 'active';
  return '';
}

function renderTimeline(status) {
  if (status === 'cancelled') {
    return `<div style="text-align:center;color:var(--red);padding:1rem 0;font-weight:600"><i class="fa fa-times-circle" style="margin-left:.4rem"></i>تم إلغاء هذا الطلب</div>`;
  }
  return `
    <div class="timeline">
      <div class="step ${getStepState(status,'pending')}">
        <div class="step-dot"><i class="fa fa-clock"></i></div>
        <div class="step-label">معلق</div>
      </div>
      <div class="step ${getStepState(status,'processing')}">
        <div class="step-dot"><i class="fa fa-cog"></i></div>
        <div class="step-label">قيد التجهيز</div>
      </div>
      <div class="step ${getStepState(status,'shipped')}">
        <div class="step-dot"><i class="fa fa-truck"></i></div>
        <div class="step-label">في الطريق</div>
      </div>
      <div class="step ${getStepState(status,'delivered')}">
        <div class="step-dot"><i class="fa fa-check"></i></div>
        <div class="step-label">تم التوصيل</div>
      </div>
    </div>`;
}

function renderOrder(o, index) {
  const sl   = statusLabels[o.status] || { ar: o.status, icon: 'fa-circle' };
  const date = new Date(o.createdAt).toLocaleDateString('ar-IQ', { year:'numeric', month:'long', day:'numeric' });
  const shortId = String(o._id).slice(-8).toUpperCase();

  return `
    <div class="order-card">
      <div class="order-header" onclick="toggleOrder('body-${index}')">
        <div>
          <div style="font-weight:700">طلب #${shortId}</div>
          <div class="order-date">${date}</div>
        </div>
        <div style="display:flex;align-items:center;gap:.8rem">
          <span class="badge ${o.status}"><i class="fa ${sl.icon}" style="margin-left:.3rem"></i>${sl.ar}</span>
          <i class="fa fa-chevron-down" style="color:var(--txt2);font-size:.8rem"></i>
        </div>
      </div>
      <div class="order-body" id="body-${index}">
        ${renderTimeline(o.status)}
        <table class="items-table">
          <thead><tr><th>المنتج</th><th>السعر</th><th style="text-align:center">الكمية</th><th>الإجمالي</th></tr></thead>
          <tbody>
            ${o.items.map(i => `
              <tr>
                <td>${i.name}</td>
                <td>${i.price.toLocaleString('ar-IQ')} د</td>
                <td style="text-align:center">${i.quantity}</td>
                <td>${(i.price * i.quantity).toLocaleString('ar-IQ')} د</td>
              </tr>`).join('')}
          </tbody>
        </table>
        <div class="total-row">
          <span>الإجمالي الكلي</span>
          <span>${o.totalPrice.toLocaleString('ar-IQ')} دينار</span>
        </div>
        ${o.notes ? `<p style="margin-top:.8rem;font-size:.85rem;color:var(--txt2)"><strong>ملاحظات:</strong> ${o.notes}</p>` : ''}
        ${o.customerAddress ? `<p style="margin-top:.4rem;font-size:.85rem;color:var(--txt2)"><strong>العنوان:</strong> ${o.customerAddress}</p>` : ''}
      </div>
    </div>`;
}

function toggleOrder(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

async function trackOrders() {
  const phone = document.getElementById('phoneInput').value.trim();
  const orderId = document.getElementById('orderIdInput').value.trim();
  
  if (!phone || !orderId) { alert('يرجى إدخال رقم الهاتف ورقم الطلب'); return; }

  const btn = document.getElementById('trackBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i>';

  const section  = document.getElementById('resultsSection');
  const content  = document.getElementById('resultsContent');
  section.style.display = 'block';
  content.innerHTML = '<div class="spinner"></div>';

  try {
    const res  = await fetch(`${API}/orders/track?phone=${encodeURIComponent(phone)}&orderId=${encodeURIComponent(orderId)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.message);

    const orders = data.orders || [];
    if (!orders.length) {
      content.innerHTML = `
        <div class="empty">
          <i class="fa fa-box-open"></i>
          <p>لا توجد طلبات مرتبطة بهذا الرقم</p>
          <p style="font-size:.85rem;margin-top:.5rem">تأكد من صحة الرقم المستخدم عند الطلب</p>
        </div>`;
    } else {
      content.innerHTML = `<div class="results-title">وجدنا ${orders.length} طلب لرقمك</div>` +
        orders.map((o, i) => renderOrder(o, i)).join('');
      // افتح أول طلب تلقائياً
      document.getElementById('body-0')?.classList.add('open');
    }
  } catch(e) {
    content.innerHTML = `<div class="empty"><i class="fa fa-exclamation-circle"></i><p>${e.message}</p></div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fa fa-search"></i> تتبع';
  }
}
</script>
</body>
</html>
