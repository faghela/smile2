<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تتبع طلبك - Smile Shop</title>
<meta name="description" content="تتبع حالة طلبك في متجر Smile Shop برقم هاتفك">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="/config.js"></script>
<link rel="stylesheet" href="/css/track.css">
</head>
<body>

<header>
  <div class="hdr">
    <a href="/" class="logo">😊 Smile Shop</a>
    <a href="/" class="back-btn"><i class="fa fa-arrow-right"></i> العودة للمتجر</a>
  </div>
</header>

<div class="hero">
  <h1><i class="fa fa-map-marker-alt" style="font-size:1.8rem"></i> تتبع طلبك</h1>
  <p>أدخل رقم هاتفك لمعرفة حالة طلباتك</p>
</div>

<div class="search-section">
  <div class="search-card">
    <label for="phoneInput">رقم الهاتف المستخدم عند الطلب</label>
    <div class="inp-row" style="margin-bottom:1rem;">
      <input class="inp" type="tel" id="phoneInput" placeholder="07xxxxxxxxx" onkeydown="if(event.key==='Enter') document.getElementById('orderIdInput').focus()">
    </div>
    <label for="orderIdInput">رقم الطلب (ID)</label>
    <div class="inp-row">
      <input class="inp" type="text" id="orderIdInput" placeholder="أدخل رقم الطلب..." onkeydown="if(event.key==='Enter') trackOrders()">
      <button class="btn-search" id="trackBtn" onclick="trackOrders()">
        <i class="fa fa-search"></i> تتبع
      </button>
    </div>
  </div>
</div>

<div class="results" id="resultsSection" style="display:none">
  <div id="resultsContent"></div>
</div>

<script src="/js/track.js"></script>
</body>
</html>
